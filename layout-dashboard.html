<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRMS Dashboard</title>

  <!-- Bootstrap Core -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- Phosphor web CSS -->
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"/>
</head>
<body class="layout-dashboard">

  <!-- ================= DASHBOARD HEADER ================= -->
  <header class="dashboard-header">
    <div class="container-fluid">
      <div class="dashboard-header__inner">
        <div class="brand d-flex align-items-center gap-3">
          <div class="brand-logo">
            <img src="src/img/brand-logo.png" alt="HRMS Logo" />
          </div>
          <div>
            <h1 class="brand-title mb-0">HRMS</h1>
            <p class="brand-subtitle mb-0">Human Resource Management System</p>
          </div>
        </div>

        <button class="profile-circle-btn" type="button" aria-label="Profile">
          <i class="bi bi-person"></i>
        </button>
      </div>
    </div>
  </header>
  <!-- ================= END DASHBOARD HEADER ================= -->


  <!-- ================= DASHBOARD MAIN ================= -->
  <main class="dashboard-main">
    <div class="container-fluid">
      <div class="row g-4">

        <!-- Dashboard Card -->
        <div class="col-md-6 col-xl-3">
          <a href="#" class="dashboard-module-card">
            <div class="dashboard-module-icon">
              <i class="ph ph-hand-arrow-up"></i>
            </div>
            <div class="dashboard-module-title">Permohonan Penjawatan</div>
          </a>
        </div>

        <div class="col-md-6 col-xl-3">
          <a href="#" class="dashboard-module-card">
            <div class="dashboard-module-icon">
              <i class="ph ph-user"></i>
            </div>
            <div class="dashboard-module-title">Peribadi</div>
          </a>
        </div>

        <div class="col-md-6 col-xl-3">
          <a href="#" class="dashboard-module-card">
            <div class="dashboard-module-icon">
              <i class="ph-fill ph-network"></i>
            </div>
            <div class="dashboard-module-title">Organisasi</div>
          </a>
        </div>

        <div class="col-md-6 col-xl-3">
          <a href="#" class="dashboard-module-card">
            <div class="dashboard-module-icon">
              <i class="ph-fill ph-chart-line-up"></i>
            </div>
            <div class="dashboard-module-title">Sasaran Kerja Tahunan</div>
          </a>
        </div>

        <div class="col-md-6 col-xl-3">
          <a href="#" class="dashboard-module-card">
            <div class="dashboard-module-icon">
              <i class="ph-fill ph-note-pencil"></i>
            </div>
            <div class="dashboard-module-title">Perubahan Gaji (ROC)</div>
          </a>
        </div>

        <div class="col-md-6 col-xl-3">
          <a href="#" class="dashboard-module-card">
            <div class="dashboard-module-icon">
              <i class="ph-fill ph-calendar-x"></i>
            </div>
            <div class="dashboard-module-title">Cuti</div>
          </a>
        </div>

        <div class="col-md-6 col-xl-3">
          <a href="#" class="dashboard-module-card">
            <div class="dashboard-module-icon">
              <i class="ph-fill ph-calendar-dots"></i>
            </div>
            <div class="dashboard-module-title">Kehadiran</div>
          </a>
        </div>

        <div class="col-md-6 col-xl-3">
          <a href="#" class="dashboard-module-card">
            <div class="dashboard-module-icon">
              <i class="ph-fill ph-calendar-check"></i>
            </div>
            <div class="dashboard-module-title">Latihan/Kursus</div>
          </a>
        </div>

        <div class="col-md-6 col-xl-6">
          <a href="#" class="dashboard-module-card dashboard-module-card--wide">
            <div class="dashboard-module-icon">
              <i class="ph-fill ph-money"></i>
            </div>
            <div class="dashboard-module-title">Gaji</div>
          </a>
        </div>

        <div class="col-md-6 col-xl-6">
          <a href="#" class="dashboard-module-card dashboard-module-card--wide">
            <div class="dashboard-module-icon">
              <i class="ph-fill ph-coins"></i>
            </div>
            <div class="dashboard-module-title">E-OT</div>
          </a>
        </div>

      </div>
    </div>
  </main>
  <!-- ================= END DASHBOARD MAIN ================= -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
